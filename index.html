<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit <track></track></title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tracker-container">
        <h2>Daily Habits</h2>
        <p class="subtitle">Gotta stay disciplined WOO</p>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="stats" id="progressText">0% Completed</p>

        <div class="habit-list">
            
            <label class="habit-item">
                <input type="checkbox" class="habit-checkbox">
                <span class="habit-text">Go for a run</span>
            </label>

            <label class="habit-item">
                <input type="checkbox" class="habit-checkbox">
                <span class="habit-text">Practice coding for 30 mins</span>
            </label>

            <label class="habit-item">
                <input type="checkbox" class="habit-checkbox">
                <span class="habit-text">Read a book</span>
            </label>
            <label class="habit-item">
                <input type="checkbox" class="habit-checkbox">
                <span class="habit-text">Drink lot of water</span>
            </label>

        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
